name: Reel Automation

permissions:
  contents: write
  
on:
  workflow_dispatch:
  push:
  
jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Stop the job if it hangs for more than 30 mins
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

    

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          sudo -v && curl https://rclone.org/install.sh | sudo bash

 

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🔉 Step 3.5 - Extract Best Part
        run: python 3.5_trim_audio.py

        
      - name: 🎬 Step 4.5 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4.5_output.sh
