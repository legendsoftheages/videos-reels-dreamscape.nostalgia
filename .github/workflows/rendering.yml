name: Reel Automation

permissions:
  contents: write
  
on:
  workflow_dispatch:
  push:
  
jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Stop the job if it hangs for more than 30 mins
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Notion & Playlist Check
        env:
          # Existing Secrets
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          # NEW Secrets
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          YT_PLAYLIST_ID: ${{ secrets.YT_PLAYLIST_ID }}
        run: python 1_Notion_check.py
